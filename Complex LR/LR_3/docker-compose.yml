services:
  db:
    image: postgres:16
    container_name: marketplace-postgres
    ports:
      - "5430:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: marketplace_db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d marketplace_db" ]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s

    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
