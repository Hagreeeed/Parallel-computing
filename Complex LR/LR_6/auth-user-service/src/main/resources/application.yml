server:
  port: 8081

spring:
  application:
    name: auth-user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5431/auth_user_db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
