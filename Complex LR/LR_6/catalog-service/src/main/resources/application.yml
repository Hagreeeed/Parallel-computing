server:
  port: 8082

spring:
  application:
    name: catalog-service
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/catalog_db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cache:
    type: redis
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379

# Resilience4j configurations for OpenFeign
resilience4j:
  circuitbreaker:
    instances:
      authUserClient:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  timelimiter:
    instances:
      authUserClient:
        timeoutDuration: 3s
