apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-user-service
  template:
    metadata:
      labels:
        app: auth-user-service
    spec:
      containers:
      - name: auth-user-service
        image: auth-user-service:latest
        imagePullPolicy: Never
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-auth:5432/auth_user_db"
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: auth-user-service
spec:
  selector:
    app: auth-user-service
  ports:
  - port: 8081
    targetPort: 8081
