apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: api-gateway:latest
        imagePullPolicy: Never
        env:
        - name: AUTH_SERVICE_URL
          value: "http://auth-user-service:8081"
        - name: CATALOG_SERVICE_URL
          value: "http://catalog-service:8082"
        - name: ORDER_SERVICE_URL
          value: "http://order-billing-service:8083"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
